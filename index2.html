<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Mim</title>
    <link rel="stylesheet" href="./style2.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <aside class="sidebar">
        <a href="#home">🏠</a>
        <a href="#skills">💼</a>
        <a href="#portfolio">📁</a>
        <a href="#education">🎓</a>
        <a href="#languages">🌎</a>
        <button onclick="ToggleEvent">☰</button>
    </aside>

    <div class="container">

        <div class="container">

            <!-- HERO / PERFIL -->
            <section id="home" class="section">
                <div class="card hero">
                    <img src="./assets/profile-perfil.png" class="profile-img">
                    <h1>Oi, eu sou <span>Juan</span></h1>
                    <p class="typing" id="typing"></p>
                    <p>Desenvolvedor focado em experiências modernas e responsivas.</p>
                    <div class="buttons">
                        <button class="btn">Ver Projetos</button>
                        <button class="btn outline">Download CV</button>
                    </div>
                </div>
            </section>

            <!-- SKILLS -->
            <section id="skills" class="section">
                <div class="card">
                    <h2>Minhas Skills</h2>

                    <div class="skill">
                        <p>HTML</p>
                        <div class="bar"><span data-width="90%"></span></div>
                    </div>

                    <div class="skill">
                        <p>CSS</p>
                        <div class="bar"><span data-width="85%"></span></div>
                    </div>

                    <div class="skill">
                        <p>JavaScript</p>
                        <div class="bar"><span data-width="75%"></span></div>
                    </div>

                </div>
            </section>

            <!-- PORTFOLIO -->
            <section id="portfolio" class="section">
                <div class="card">
                    <h2>Projetos</h2>

                    <div class="portfolio-grid">

                        <div class="portfolio-item">
                            <img src="https://picsum.photos/300">
                            <div class="overlay">Projeto 1</div>
                        </div>

                        <div class="portfolio-item">
                            <img src="https://picsum.photos/301">
                            <div class="overlay">Projeto 2</div>
                        </div>

                    </div>
                </div>
            </section>

            <!-- EDUCATION -->
            <section id="education" class="section">
                <div class="card">
                    <h2>Educação</h2>
                    <p>Curso de Desenvolvimento Web</p>
                    <p>Certificações diversas</p>
                </div>
            </section>

            <!-- LANGUAGES -->
            <section id="languages" class="section">
                <div class="card">
                    <h2>Idiomas</h2>

                    <div class="skill">
                        <p>Português</p>
                        <div class="bar"><span data-width="100%"></span></div>
                    </div>

                    <div class="skill">
                        <p>Inglês</p>
                        <div class="bar"><span data-width="70%"></span></div>
                    </div>

                </div>
            </section>
        </div>

</body>

<script src="./Scroll.js"></script>
<script src="./emphasis.js"></script>

</html>
