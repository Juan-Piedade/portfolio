<!DOCTYPE html>
<html lang="pt-br" class="light">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Meu Linktree</title>
</head>

<body>
    <div id="container">

        <div id="profile">
            <img src="./assets/profile.png" alt="Foto de perfil">
            <p>@juan_pg</p>
        </div>

        <div id="switch" onclick="toggleMode()">
            <button> </button>
            <span> </span>
        </div>

        <ul>
            <li><a href="#">Sobre mim</a></li>
            <li><a href="https://github.com/Juan-Piedade" target="_blank">Veja meu portfólio</a></li>
            <li><a href="#">Onde aprendi</a></li>
        </ul>

        <div id="social-links">
            <a href="https://github.com/Juan-Piedade" target="_blank">
                <ion-icon name="logo-github"></ion-icon>
            </a>
            <a href="https://twitter.com/juan_pg" target="_blank">
                <ion-icon name="logo-twitter"></ion-icon>
            </a>
            <a href="https://www.instagram.com/juan_pg/" target="_blank">
                <ion-icon name="logo-instagram"></ion-icon>
            </a>
            <a href="https://www.youtube.com/@JuanPiedade" target="_blank">
                <ion-icon name="logo-youtube"></ion-icon>
            <a href="https://www.linkedin.com/in/juan-piedade/" target="_blank">
                <ion-icon name="logo-linkedin"></ion-icon>
            </a>
        </div>

        <footer>
            <p>Feito com ♥ pelo <a href="https://github.com/Juan-Piedade" target="_blank">Juan-Piedade</a></p>
        </footer>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script src="./script.js"></script>
</body>

</html>
